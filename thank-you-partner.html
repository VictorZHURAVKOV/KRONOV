<style>
:root{--c-dark:#1E1410;--c-sand:#D4B896;--c-cream:#F2EBE0;--c-bordo:#7A2E38;--c-bronze:#B8965A;--c-text:#2A1C0E;--c-text-light:#6B5540;--c-white:#FFFFFF;--font-display:'Playfair Display',Georgia,serif;--font-body:'Montserrat','Helvetica Neue',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--c-cream);color:var(--c-text);min-height:100vh;display:flex;flex-direction:column;padding:40px 20px}
a{color:inherit;text-decoration:none}
.box{max-width:640px;margin:auto;background:var(--c-white);border-radius:16px;padding:48px 40px;text-align:center;box-shadow:0 24px 60px rgba(30,20,16,.08)}
.check{width:72px;height:72px;border-radius:50%;background:var(--c-bordo);color:var(--c-cream);font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
h1{font-family:var(--font-display);font-size:clamp(26px,4vw,34px);color:var(--c-dark);margin-bottom:14px;line-height:1.2;font-weight:500}
p{color:var(--c-text-light);line-height:1.65;margin-bottom:22px;font-size:16px}
.btn{display:inline-block;padding:14px 30px;background:var(--c-bordo);color:var(--c-cream);border-radius:6px;font-weight:600;letter-spacing:.4px}
.btn:hover{background:#5C1F28}
.logo{font-family:var(--font-display);letter-spacing:3px;font-size:16px;color:var(--c-bronze);margin-bottom:30px;display:block;text-align:center}
</style>
</head>
<body>
<a href="index.html" class="logo">КРОНОВЪ</a>
<div class="box">
  <div class="check">✓</div>
  <h1>Заявка на партнёрство принята</h1>
  <p>Менеджер по партнёрской программе свяжется с&nbsp;вами в&nbsp;течение <strong style="color:var(--c-bordo)">2&nbsp;рабочих дней</strong> для обсуждения условий и&nbsp;отправки партнёрского соглашения.</p>
  <p style="font-size:14px">Пока ждёте — посмотрите наши беседки в&nbsp;каталоге, чтобы предложить клиентам.</p>
  <a href="index.html#catalog" class="btn">Открыть каталог</a>
</div>
<script>if (window.gtag) gtag('event', 'form_submit_success', { form_type: 'partner' });</script>
